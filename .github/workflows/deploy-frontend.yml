name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Build the frontend
        # The base-href must match your GitHub repository name exactly!
        run: npx ng build --configuration production --base-href /Group-Study-Board/
      - name: Fix routing for GitHub Pages
        # GitHub pages doesn't support Angular routing natively, so we copy index.html to 404.html
        run: cp dist/group-study-board/index.html dist/group-study-board/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Your build output directory
          path: './frontend/dist/group-study-board'
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
